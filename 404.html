<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 Not Found</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
        color: white;
        font-family: monospace;
    }

    .container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        text-align: center;
    }

    .code {
        font-size: 90px;
        font-weight: bold;
        letter-spacing: 5px;
    }

    .text {
        opacity: 0.6;
        margin-top: 10px;
    }

    .alert {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: red;
        font-size: 14px;
        opacity: 0;
    }

    .alert.show {
        opacity: 1;
        animation: glitch 0.15s infinite;
    }

    @keyframes glitch {
        0% { transform: translateX(-50%) translate(0,0); }
        25% { transform: translateX(-50%) translate(-2px,1px); }
        50% { transform: translateX(-50%) translate(2px,-1px); }
        75% { transform: translateX(-50%) translate(-1px,2px); }
        100% { transform: translateX(-50%) translate(0,0); }
    }
</style>
</head>

<body>

<div class="alert" id="alert">
    console: system anomaly detected
</div>

<div class="container">
    <div class="code">404</div>
    <div class="text">not found</div>
</div>

<script>
    console.log("instance mismatch confirmed");
    console.log("----------------------------");
    console.log("ACCESS PATH:");
    console.log("https://drive.google.com/drive/folders/1mb2PTIYIdztVRjrSpObHdyyyLNgIxqKP");
    console.log("----------------------------");

    const alertBox = document.getElementById("alert");

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(900, ctx.currentTime);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);

        setTimeout(() => {
            oscillator.stop();
            ctx.close();
        }, 100);
    }

    function triggerAlert() {
        alertBox.classList.add("show");
        playBeep();

        setTimeout(() => {
            alertBox.classList.remove("show");
        }, 250);
    }

    setInterval(triggerAlert, 1200);
</script>

</body>
</html>
